name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            artifact: windows
          - os: macos-latest
            platform: mac
            arch: x64
            artifact: macos-x64
          - os: macos-latest
            platform: mac
            arch: arm64
            artifact: macos-arm64
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            artifact: linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.artifact }})

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Cesium assets
        run: npm run setup-cesium

      - name: Build app
        run: npm run build

      - name: Build Electron distributable
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
          if-no-files-found: error
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: find artifacts -type f | head -20

      - name: Generate release notes
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges)
            COMPARE="[Full diff](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG})"
          else
            CHANGELOG=$(git log "${TAG}" --pretty=format:"- %s (%h)" --no-merges)
            COMPARE=""
          fi
          NOTES_FILE="release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            EXTRA_NOTES=$(cat "$NOTES_FILE")
          else
            EXTRA_NOTES=""
          fi
          {
            echo "## ARGUS ${TAG}"
            echo ""
            echo "${EXTRA_NOTES}"
            echo ""
            echo "### Commits"
            echo "${CHANGELOG}"
            echo ""
            if [ -n "$COMPARE" ]; then
              echo "${COMPARE}"
              echo ""
            fi
            echo "---"
            echo "Download the installer for your platform below and run it."
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Windows | \`.exe\` |"
            echo "| macOS (Intel) | \`.dmg\` (x64) |"
            echo "| macOS (Apple Silicon) | \`.dmg\` (arm64) |"
            echo "| Linux | \`.AppImage\` |"
          } > release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.AppImage
          draft: false
          prerelease: false
          body_path: release-body.md

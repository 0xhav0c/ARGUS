name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            artifact: windows
          - os: macos-latest
            platform: mac
            arch: x64
            artifact: macos-x64
          - os: macos-latest
            platform: mac
            arch: arm64
            artifact: macos-arm64
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            artifact: linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.artifact }})

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Cesium assets
        run: npm run setup-cesium

      - name: Build app
        run: npm run build

      - name: Build Electron distributable
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
          if-no-files-found: error
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.AppImage
          draft: false
          prerelease: false
          body: |
            ## ARGUS — Real-time Global OSINT & Intelligence Dashboard

            A desktop intelligence platform that aggregates, classifies, and visualizes global incidents in real-time on an interactive 3D globe.

            ### Highlights

            **Intelligence & Analysis**
            - 3D CesiumJS globe with real-time incident markers, heatmaps, animated arcs, and multi-layer overlays
            - 50+ open-source feed aggregation across CONFLICT, CYBER, INTEL, and FINANCE domains
            - AI-powered summarization and daily briefings via Ollama, OpenAI, or custom endpoints
            - Smart alert system with geofence triggers, keyword matching, and desktop notifications
            - Cyber threat intelligence with CVE tracking, ransomware feeds, and IoC extraction

            **Tracking & Monitoring**
            - Real-time flight tracking (OpenSky Network) with military aircraft filtering
            - Maritime vessel tracking with route visualization
            - Earthquake monitoring (USGS) and disaster tracking (GDACS)
            - Nuclear facility monitoring, pandemic surveillance, and weather alerts
            - VIP social media monitoring (X/Twitter) and Telegram channel aggregation

            **Media & Live TV**
            - Multi-channel live TV grid (2×2 / 3×3 / 4×4) with 40+ preset news channels
            - YouTube live stream resolution with optimized iframe embedding
            - Custom app:// protocol scheme for reliable YouTube embed in packaged builds
            - HLS.js player for direct m3u8 streams with 480p quality cap
            - Ad/tracker domain blocking for clean playback
            - Template system for saving and loading channel layouts

            **Architecture**
            - Electron 41 + React 19 + TypeScript + electron-vite
            - SQLite (better-sqlite3) offline-first incident caching
            - Multi-process IPC with cascade data refresh pipeline
            - Zustand state management with persistence
            - Content Security Policy hardened for production

            ### Installation
            Download the installer for your platform below and run it. No additional setup required.

            | Platform | File |
            |----------|------|
            | Windows | `.exe` |
            | macOS (Intel) | `.dmg` (x64) |
            | macOS (Apple Silicon) | `.dmg` (arm64) |
            | Linux | `.AppImage` |
